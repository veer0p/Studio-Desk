name: Build, push, deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend/studiodesk
          - name: frontend
            context: frontend/studiodesk-web
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image owner
        id: owner
        run: echo "lc=${IMAGE_OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_OWNER: ${{ env.IMAGE_OWNER }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/studio-desk-${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/studio-desk-${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(vars.VPS_HOSTS) }}
    steps:
      - name: Lowercase image owner
        id: owner
        run: echo "lc=${IMAGE_OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_OWNER: ${{ env.IMAGE_OWNER }}

      - name: Deploy to ${{ matrix.host }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ matrix.host }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 10m
          envs: GHCR_TOKEN,GITHUB_ACTOR,REGISTRY,OWNER,SHA
          script: |
            set -euo pipefail

            FRONT_IMAGE="$REGISTRY/$OWNER/studio-desk-frontend:$SHA"
            BACK_IMAGE="$REGISTRY/$OWNER/studio-desk-backend:$SHA"

            APP_DIR=/opt/studio-desk
            NET=studio-desk-net
            UPSTREAM_FILE=/etc/nginx/conf.d/studio-desk-upstream.conf

            [ -f "$APP_DIR/backend.env" ]  || { echo "Missing $APP_DIR/backend.env";  exit 1; }
            [ -f "$APP_DIR/frontend.env" ] || { echo "Missing $APP_DIR/frontend.env"; exit 1; }

            echo "== Login to GHCR =="
            echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GITHUB_ACTOR" --password-stdin

            echo "== Ensure docker network =="
            docker network inspect "$NET" >/dev/null 2>&1 || docker network create "$NET"

            echo "== Pull images =="
            docker pull "$FRONT_IMAGE"
            docker pull "$BACK_IMAGE"

            # Blue/green color selection
            if docker ps --format '{{.Names}}' | grep -q '^studio-desk-frontend-blue$'; then
              OLD=blue;  NEW=green; NEW_FRONT=3030; NEW_BACK=3031
            else
              OLD=green; NEW=blue;  NEW_FRONT=3020; NEW_BACK=3021
            fi
            echo "Deploying $NEW (replacing $OLD); frontPort=$NEW_FRONT backPort=$NEW_BACK"

            BACK_NAME="studio-desk-backend-$NEW"
            FRONT_NAME="studio-desk-frontend-$NEW"

            docker rm -f "$FRONT_NAME" 2>/dev/null || true
            docker rm -f "$BACK_NAME"  2>/dev/null || true

            echo "== Start backend ($NEW) =="
            docker run -d \
              --name "$BACK_NAME" \
              --network "$NET" \
              --restart unless-stopped \
              --env-file "$APP_DIR/backend.env" \
              -p "127.0.0.1:$NEW_BACK:3001" \
              "$BACK_IMAGE"

            echo "== Start frontend ($NEW) =="
            docker run -d \
              --name "$FRONT_NAME" \
              --network "$NET" \
              --restart unless-stopped \
              --env-file "$APP_DIR/frontend.env" \
              -e "BACKEND_INTERNAL_URL=http://$BACK_NAME:3001" \
              -p "127.0.0.1:$NEW_FRONT:3000" \
              "$FRONT_IMAGE"

            echo "== Health check =="
            ok=0
            for i in $(seq 1 45); do
              if curl -fsS -o /dev/null -w '%{http_code}' "http://127.0.0.1:$NEW_FRONT" | grep -qE '^(200|301|302|307|308|404)$' \
                 && curl -fsS -o /dev/null -w '%{http_code}' "http://127.0.0.1:$NEW_BACK"  | grep -qE '^(200|301|302|307|308|404)$'; then
                ok=1; echo "Both responding on attempt $i"; break
              fi
              sleep 2
            done
            if [ "$ok" != "1" ]; then
              echo "Health check failed; logs:"
              docker logs --tail 120 "$FRONT_NAME" || true
              docker logs --tail 120 "$BACK_NAME"  || true
              docker rm -f "$FRONT_NAME" "$BACK_NAME" || true
              exit 1
            fi

            echo "== Swap nginx upstream =="
            sudo tee "$UPSTREAM_FILE" >/dev/null <<EOF
            upstream studio_desk_frontend { server 127.0.0.1:$NEW_FRONT; keepalive 16; }
            upstream studio_desk_backend  { server 127.0.0.1:$NEW_BACK;  keepalive 16; }
            EOF
            sudo nginx -t
            sudo systemctl reload nginx

            echo "== Stop old containers =="
            docker rm -f "studio-desk-frontend-$OLD" 2>/dev/null || true
            docker rm -f "studio-desk-backend-$OLD"  2>/dev/null || true

            docker image prune -f >/dev/null || true
            echo "Deploy OK: $NEW"
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          REGISTRY: ${{ env.REGISTRY }}
          OWNER: ${{ steps.owner.outputs.lc }}
          SHA: ${{ github.sha }}
