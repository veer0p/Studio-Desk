name: Build and push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend/studiodesk
          - name: frontend
            context: frontend/studiodesk-web
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image owner
        id: owner
        run: echo "lc=${IMAGE_OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_OWNER: ${{ env.IMAGE_OWNER }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/studio-desk-${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/studio-desk-${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
