# Studio-Desk site config.
# Install on VPS:
#   sudo cp studio-desk.conf /etc/nginx/sites-available/studio-desk
#   sudo ln -s /etc/nginx/sites-available/studio-desk /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Upstreams are defined in /etc/nginx/conf.d/studio-desk-upstream.conf
# and rewritten on every deploy by the GitHub Actions workflow.

server {
    listen 80;
    listen [::]:80;
    server_name studio-desk.veer-vps.duckdns.org;

    client_max_body_size 50m;

    # Backend API — goes straight to the backend container
    location /api/v1/ {
        proxy_pass http://studio_desk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass http://studio_desk_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 120s;
    }
}
